<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:40px;
}
button {
  padding:10px 20px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover {
  background:#dc2626;
}
</style>
</head>
<body>

<h1>Área Protegida 🔐</h1>
<p>Se você está vendo isso, o middleware validou seu JWT.</p>

<button onclick="logout()">Logout</button>

<script>
async function logout() {
  await fetch('/api/logout', { method:'POST' })
  window.location.href = '/login.html'
}
</script>

</body>
</html>
